<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Apartment VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
    <style>
      body { margin: 0; background: #000; }
    </style>
  </head>
  <body>
    <a-scene
      renderer="antialias: true; colorManagement: true"
      vr-mode-ui="enabled: true"
      loading-screen="dotsColor: white; backgroundColor: #111"
    >

      <!-- ── CAMERA RIG ─────────────────────────────────────────────────────── -->
      <!-- movement-controls gives you left-thumbstick locomotion on Quest      -->
      <a-entity id="rig" movement-controls="speed: 0.1" position="0 1.6 0">

        <a-entity
          camera
          position="0 0 0"
          look-controls="pointerLockEnabled: false"
        ></a-entity>

        <!-- Right controller: point laser + trigger to teleport -->
        <a-entity
          id="right-hand"
          laser-controls="hand: right"
          teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: trigger; collisionEntities: .floor"
          raycaster="objects: .floor; far: 20"
        ></a-entity>

        <!-- Left controller: optional laser for UI -->
        <a-entity
          id="left-hand"
          laser-controls="hand: left"
          raycaster="objects: .floor; far: 20"
        ></a-entity>

      </a-entity>

      <!-- ── YOUR APARTMENT SCAN ────────────────────────────────────────────── -->
      <!-- 🔧 Change "apartment.gltf" to match your exact filename              -->
      <a-entity
        gltf-model="url(apartment.gltf)"
        position="0 0 0"
        scale="1 1 1"
      ></a-entity>

      <!-- ── INVISIBLE FLOOR (for teleport targeting) ───────────────────────── -->
      <a-plane
        class="floor"
        position="0 0 0"
        rotation="-90 0 0"
        width="200"
        height="200"
        visible="false"
      ></a-plane>

      <!-- ── LIGHTING ───────────────────────────────────────────────────────── -->
      <a-light type="ambient" color="#fff" intensity="1.2"></a-light>
      <a-light type="directional" position="2 4 3" intensity="0.8"></a-light>

      <!-- ── SKY ───────────────────────────────────────────────────────────── -->
      <a-sky color="#111111"></a-sky>

    </a-scene>
  </body>
</html>
